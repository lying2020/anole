name: anole
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch=2.1.1
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch-cuda=12.1
  - numpy=1.26.4
  - pandas=2.2.2
  - pillow=10.0.1
  - pyarrow=16.1.0
  - pip:
    - accelerate==0.31.0
    - deepspeed==0.14.4
    - jsonlines==4.0.0
    - mpi4py_mpich==3.1.5
    - xformers==0.0.23
    - python-dotenv==1.0.1
    - click
    - flask
    - flask_socketio
